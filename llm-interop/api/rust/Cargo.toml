[package]
name = "wia-llm-interop"
version = "1.0.0"
edition = "2021"
authors = ["WIA - World Certification Industry Association"]
description = "WIA LLM Interoperability Standard - AI들의 연동 표준"
license = "MIT"
repository = "https://github.com/WIA-Official/wia-standards"
keywords = ["wia", "llm", "ai", "federation", "interop"]
categories = ["api-bindings", "web-programming"]

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time & UUID
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v7", "serde"] }

# HTTP client (for provider adapters)
reqwest = { version = "0.12", features = ["json", "stream"] }

# Async utilities
futures = "0.3"
async-trait = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# String similarity (for matching)
strsim = "0.11"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "wia-llm-interop"
path = "src/main.rs"

[lib]
name = "wia_llm_interop"
path = "src/lib.rs"
