[package]
name = "wia-battery-passport"
version = "1.0.0"
edition = "2021"
authors = ["WIA - World Certification Industry Association"]
description = "WIA Battery Passport API - EU Battery Regulation 2027 compliant"
license = "MIT"
repository = "https://github.com/WIA-Official/wia-standards"
keywords = ["battery", "passport", "eu-regulation", "ev", "sustainability"]
categories = ["api-bindings", "automotive"]

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1.0", features = ["v7", "serde"] }

# Cryptography
sha2 = "0.10"
ed25519-dalek = "2.0"
base64 = "0.22"

# Validation
validator = { version = "0.18", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

[dev-dependencies]
tokio-test = "0.4"
tower = { version = "0.5", features = ["util"] }
hyper = { version = "1.0", features = ["full"] }

[[bin]]
name = "wia-battery-passport-server"
path = "src/main.rs"

[lib]
name = "wia_battery_passport"
path = "src/lib.rs"
