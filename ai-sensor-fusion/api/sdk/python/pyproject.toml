[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-sensor-fusion"
version = "1.0.0"
description = "WIA AI Sensor Fusion Python SDK (Multi-sensor fusion pipeline registration and fused-state retrieval)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-sensor-fusion", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-sensor-fusion/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_sensor_fusion*"]
