[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-permafrost-protection"
version = "1.0.0"
description = "WIA Permafrost Protection Python SDK (Permafrost monitoring station registration, thermal observations, and degradation alerts)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "permafrost-protection", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/permafrost-protection/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_permafrost_protection*"]
