<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>WIA Haptic 표준 - Ebook</title>
    <style>
        :root { --primary: #8B5CF6; --primary-dark: #7C3AED; --secondary: #10b981; --bg: #0f172a; --bg-card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--primary); font-weight: bold; font-size: 1.2rem; }
        .logo-emoji { font-size: 1.5rem; }
        .lang-toggle { display: flex; gap: 8px; }
        .lang-toggle a { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); text-decoration: none; transition: all 0.3s; }
        .lang-toggle a:hover { border-color: var(--primary); color: var(--primary); }
        .lang-toggle a.active { background: var(--primary); color: white; border-color: var(--primary); }

        .hero { text-align: center; padding: 60px 20px; background: var(--bg-card); border-radius: 16px; margin-bottom: 40px; }
        .hero-emoji { font-size: 4rem; margin-bottom: 20px; }
        .hero h1 { font-size: 2rem; margin-bottom: 10px; color: var(--primary); }
        .hero .philosophy { color: #ffd700; margin-bottom: 10px; }
        .hero p { color: var(--text-muted); max-width: 500px; margin: 0 auto; }

        .toc { background: var(--bg-card); border-radius: 12px; padding: 30px; }
        .toc h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.4rem; }
        .toc-list { list-style: none; }
        .toc-item { border-bottom: 1px solid var(--border); }
        .toc-item:last-child { border-bottom: none; }
        .toc-link { display: flex; align-items: center; padding: 18px 0; text-decoration: none; color: var(--text); transition: all 0.3s; }
        .toc-link:hover { color: var(--primary); padding-left: 10px; }
        .toc-number { background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 0.9rem; font-weight: bold; }
        .toc-title { flex: 1; }
        .toc-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 3px; }
        .toc-arrow { color: var(--text-muted); font-size: 1.2rem; }

        footer { text-align: center; margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border); }
        footer .philosophy { color: #ffd700; margin-bottom: 10px; }
        footer p { color: var(--text-muted); margin: 5px 0; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../" class="logo">
                <span class="logo-emoji">🤚</span>
                <span>WIA Haptic</span>
            </a>
            <div class="lang-toggle">
                <a href="../en/">EN</a>
                <a href="../ko/" class="active">KO</a>
            </div>
        </header>

        <section class="hero">
            <div class="hero-emoji">🤚</div>
            <p class="philosophy">弘益人間 · 널리 인간을 이롭게 하라</p>
            <h1>WIA 햅틱 점자 인터페이스 표준</h1>
            <p>보조 기술 및 촉각 커뮤니케이션을 위한 햅틱 피드백 표준 완벽 가이드.</p>
        </section>

        </div>
</body>
</html>
