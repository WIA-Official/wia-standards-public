[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-pet-genome"
version = "1.0.0"
description = "WIA Pet Genome Python SDK (Companion-animal genome data submission and breed/disease screening)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "pet-genome", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/pet-genome/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_pet_genome*"]
