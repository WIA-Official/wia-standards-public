<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 외곽 원 -->
  <circle cx="100" cy="100" r="95" fill="url(#goldGradient)" filter="url(#shadow)"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#B8860B" stroke-width="3"/>
  <circle cx="100" cy="100" r="75" fill="#FFFEF0"/>
  
  <!-- WIA 텍스트 -->
  <text x="100" y="70" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="bold" fill="#B8860B">WIA</text>
  
  <!-- GOLD 텍스트 -->
  <text x="100" y="100" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" font-weight="bold" fill="url(#goldGradient)">GOLD</text>
  
  <!-- Accessibility 텍스트 -->
  <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">ACCESSIBILITY</text>
  
  <!-- 체크마크 -->
  <circle cx="100" cy="155" r="18" fill="#4CAF50"/>
  <path d="M90 155 L97 162 L112 147" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 별 장식 -->
  <polygon points="100,25 103,35 113,35 105,42 108,52 100,46 92,52 95,42 87,35 97,35" fill="#FFD700"/>
</svg>
