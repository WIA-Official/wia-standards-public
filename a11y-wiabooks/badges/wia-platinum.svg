  <text x="100" y="68" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" font-weight="bold" fill="#505050">WIA</text>
  <text x="100" y="98" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="url(#platinumGradient)" stroke="#888" stroke-width="0.5">PLATINUM</text>
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">ACCESSIBILITY</text>
  
