<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA Language Modal 211 - Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .demo-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 2rem;
        }
        
        .subtitle {
            color: #666;
            margin: 0 0 30px 0;
        }
        
        .demo-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .demo-btn {
            padding: 15px 25px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }
        
        .demo-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .demo-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }
        
        .demo-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .language-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 30px 0;
            text-align: center;
        }
        
        .current-lang {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }
        
        .feature i {
            color: #667eea;
        }
        
        code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .console-output {
            background: #1e293b;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 60px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>🌍 WIA Language Modal 211</h1>
        <p class="subtitle">Complete 211 Languages Selection Component</p>
        
        <div class="language-display">
            <div>Current Language</div>
            <div class="current-lang" id="currentLangDisplay">EN</div>
            <div id="langName" style="color: #666; margin-top: 10px;">English</div>
        </div>
        
        <div class="demo-buttons">
            <button class="demo-btn primary language-btn">
                <span>
                    <i class="fas fa-globe"></i>
                    Open Language Modal (Auto)
                </span>
                <span>
                    <code>.language-btn</code>
                </span>
            </button>
            
            <button class="demo-btn" onclick="WIALanguageModal.open()">
                <span>
                    <i class="fas fa-code"></i>
                    Open via JavaScript
                </span>
                <span>
                    <code>WIALanguageModal.open()</code>
                </span>
            </button>
            
            <button class="demo-btn" onclick="testFilter('asian')">
                <span>
                    <i class="fas fa-filter"></i>
                    Open with Asian Filter
                </span>
                <span>
                    <code>filter('asian')</code>
                </span>
            </button>
            
            <button class="demo-btn" onclick="testFilter('popular')">
                <span>
                    <i class="fas fa-star"></i>
                    Show Popular Languages
                </span>
                <span>
                    <code>filter('popular')</code>
                </span>
            </button>
            
            <button class="demo-btn" onclick="randomLanguage()">
                <span>
                    <i class="fas fa-random"></i>
                    Select Random Language
                </span>
                <span>
                    <code>selectLanguage()</code>
                </span>
            </button>
        </div>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-check"></i>
                <span>211 Languages</span>
            </div>
            <div class="feature">
                <i class="fas fa-check"></i>
                <span>7 Continent Filters</span>
            </div>
            <div class="feature">
                <i class="fas fa-check"></i>
                <span>Real-time Search</span>
            </div>
            <div class="feature">
                <i class="fas fa-check"></i>
                <span>Auto Save</span>
            </div>
        </div>
        
        <div class="console-output" id="console">
            > WIA Language Modal 211 Ready<br>
            > Click any button to test
        </div>
    </div>
    
    <!-- Include the component -->
    <script src="wia-language-modal-254.js"></script>
    
    <script>
        // Update display when language changes
        WIALanguageModal.onLanguageChange = function(code) {
            const display = document.getElementById('currentLangDisplay');
            const nameDisplay = document.getElementById('langName');
            const consoleEl = document.getElementById('console');
            
            display.textContent = code.split('-')[0].toUpperCase().substring(0, 2);
            
            const lang = WIALanguageModal.languages[code];
            if (lang) {
                nameDisplay.textContent = lang.native || lang.name || code;
            }
            
            consoleEl.innerHTML += `<br>> Language changed to: ${code}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };
        
        function testFilter(filter) {
            WIALanguageModal.filterLanguages(filter);
            WIALanguageModal.open();
            
            const consoleEl = document.getElementById('console');
            consoleEl.innerHTML += `<br>> Opening modal with filter: ${filter}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
        
        function randomLanguage() {
            const codes = Object.keys(WIALanguageModal.languages);
            const randomCode = codes[Math.floor(Math.random() * codes.length)];
            WIALanguageModal.selectLanguage(randomCode);
            
            const consoleEl = document.getElementById('console');
            consoleEl.innerHTML += `<br>> Random language selected: ${randomCode}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
        
        // Log component status
        window.addEventListener('load', function() {
            const consoleEl = document.getElementById('console');
            const langCount = Object.keys(WIALanguageModal.languages).length;
            consoleEl.innerHTML += `<br>> Loaded ${langCount} languages`;
            
            // Update current language
            const savedLang = localStorage.getItem('wiabooks_language') || 'en';
            const display = document.getElementById('currentLangDisplay');
            display.textContent = savedLang.split('-')[0].toUpperCase().substring(0, 2);
        });
    </script>
</body>
</html>
