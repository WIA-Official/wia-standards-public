<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 WIA Language Modal - Test Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #667eea;
            --bg: #f8fafc;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 50px;
            text-align: center;
        }
        
        .test-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: var(--accent);
            margin-bottom: 30px;
        }
        
        .language-btn {
            background: var(--accent);
            color: white;
            border: 2px solid var(--accent);
            padding: 15px 25px;
            border-radius: 25px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            margin: 20px 0;
        }
        
        .language-btn:hover {
            background: transparent;
            color: var(--accent);
            transform: translateY(-2px);
        }
        
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            background: #f0f9ff;
            border: 1px solid #0ea5e9;
        }
        
        .log {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🌍 WIA Language Modal Test</h1>
        <p>이 페이지는 WIA Language Component의 테스트 페이지입니다.</p>
        
        <div class="status">
            <strong>현재 선택된 언어:</strong> 
            <span id="currentLangDisplay">EN</span>
        </div>
        
        <button class="language-btn" onclick="openLanguageModal()">
            <i class="fas fa-globe"></i>
            <span>언어 선택 (211개)</span>
            <i class="fas fa-chevron-down"></i>
        </button>
        
        <div class="log" id="logContainer">
            <div>🚀 페이지 로드 완료</div>
        </div>
        
        <p style="margin-top: 30px; color: #64748b; font-size: 14px;">
            📁 /var/www/wiabooks/components/language-modal-254/<br>
            👨‍💻 개발: PM Claude 후임자 기술 동생 Claude<br>
            🏢 WIA Family 프로젝트
        </p>
    </div>

    <!-- WIA Language Modal Component -->
    <script src="wia-language-modal-254.js"></script>
    
    <script>
        function addLog(message) {
            const log = document.getElementById('logContainer');
            const div = document.createElement('div');
            div.innerHTML = `${new Date().toLocaleTimeString()} - ${message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }
        
        // 언어 변경 이벤트 리스너
        window.addEventListener('wia-language-changed', function(event) {
            const newLang = event.detail.language;
            addLog(`✅ 언어 변경됨: ${newLang}`);
            
            // 현재 언어 표시 업데이트
            const display = document.getElementById('currentLangDisplay');
            if (display) {
                display.textContent = newLang.split('-')[0].toUpperCase().substring(0, 2);
            }
            
            // 로컬스토리지에 저장
            localStorage.setItem('wiabooks_language', newLang);
            addLog(`💾 로컬스토리지 저장: ${newLang}`);
        });
        
        // 페이지 로드시 저장된 언어 표시
        document.addEventListener('DOMContentLoaded', function() {
            addLog('📱 DOM 로드 완료');
            
            const savedLang = localStorage.getItem('wiabooks_language') || 'en';
            const display = document.getElementById('currentLangDisplay');
            if (display) {
                display.textContent = savedLang.split('-')[0].toUpperCase().substring(0, 2);
            }
            addLog(`🔄 저장된 언어 복원: ${savedLang}`);
            
            // WIALang211 로드 상태 확인
            setTimeout(() => {
                if (window.WIALang211) {
                    addLog('✅ WIALang211 컴포넌트 로드 성공');
                } else {
                    addLog('❌ WIALang211 컴포넌트 로드 실패');
                }
            }, 1000);
        });
    </script>
</body>
</html>
