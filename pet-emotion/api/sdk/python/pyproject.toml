[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-pet-emotion"
version = "1.0.0"
description = "WIA Pet Emotion Python SDK (Pet emotion detection and behavioral state classification)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "pet-emotion", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/pet-emotion/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_pet_emotion*"]
