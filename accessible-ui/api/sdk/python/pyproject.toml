[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-accessible-ui"
version = "1.0.0"
description = "WIA Accessible UI Python SDK (WCAG 2.1 AAA accessibility validation, contrast checking, ARIA management)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "accessible-ui", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/accessible-ui/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_accessible_ui*"]
