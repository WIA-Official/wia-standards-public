[package]
name = "wia-refugee-credential"
version = "1.0.0"
edition = "2021"
authors = ["WIA - World Certification Industry Association"]
description = "WIA Refugee Credential - Dignity preserved beyond borders"
license = "MIT"
repository = "https://github.com/WIA-Official/wia-standards"
keywords = ["refugee", "credential", "verification", "humanitarian", "education"]
categories = ["api-bindings", "authentication"]

[dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Web framework
axum = { version = "0.7", features = ["ws", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1.0", features = ["v7", "serde"] }

# Cryptography
sha2 = "0.10"
ed25519-dalek = "2.0"
base64 = "0.22"

# Validation
validator = { version = "0.18", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Fuzzy matching
strsim = "0.11"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "wia-refugee-credential-server"
path = "src/main.rs"

[lib]
name = "wia_refugee_credential"
path = "src/lib.rs"
