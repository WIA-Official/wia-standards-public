openapi: 3.0.3
info:
  title: WIA Roadmap API
  version: 1.0.0
servers: [{ url: https://localhost:8443/roadmap/v1 }]
paths:
  /milestones:
    post: { summary: Publish a milestone envelope, responses: { '202': { description: Accepted } } }
    get:  { summary: Query milestones, responses: { '200': { description: OK } } }
  /milestones/{id}:
    get: { summary: Fetch milestone, responses: { '200': { description: OK } } }
  /dependencies:
    post: { summary: Publish a dependency declaration, responses: { '202': { description: Accepted } } }
  /releases:
    post: { summary: Publish a release envelope, responses: { '202': { description: Accepted } } }
  /progress:
    post: { summary: Publish a progress update, responses: { '202': { description: Accepted } } }
  /commitments/changes:
    post: { summary: Publish a commitment change, responses: { '202': { description: Accepted } } }
  /stream:
    get: { summary: SSE stream of new envelopes, responses: { '200': { description: text/event-stream } } }
