[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-agricultural-robot"
version = "1.0.0"
description = "WIA Agricultural Robot Python SDK (Autonomous agricultural-robot fleet registration, telemetry, and task assignment)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "agricultural-robot", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/agricultural-robot/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_agricultural_robot*"]
