openapi: 3.1.0
info:
  title: WIA-FOOD-007 Food Allergy Passport API
  version: 1.0.0
  description: |
    OpenAPI 3.1 description for the Food Allergy Passport standard.
    Endpoints support allergen-profile registration, cross-establishment
    allergen lookup, and incident reporting. Authentication uses
    OAuth 2.1 (RFC 9700) with mTLS for institutional callers.
servers:
  - url: https://api.example.com/wia-food-007/v1
paths:
  /passport/{id}:
    get:
      summary: Retrieve a food-allergy passport
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: OK } }
  /allergens:
    get:
      summary: List supported allergens (Codex Alimentarius CXS 1-1985)
      responses: { '200': { description: OK } }
  /incident:
    post:
      summary: Report a food-allergy incident
      responses: { '201': { description: Created } }
