<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA Screen Reader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <header>
            <div class="logo">
                <span class="logo-icon">🔊</span>
                <span class="logo-text">WIA Screen Reader</span>
            </div>
            <span class="version">v1.0.0</span>
        </header>

        <section class="quick-actions">
            <button id="btn-wihp" class="action-btn primary">
                <span class="icon">🇰🇷</span>
                <span>WIHP</span>
            </button>
            <button id="btn-braille" class="action-btn">
                <span class="icon">⠿</span>
                <span>Braille</span>
            </button>
            <button id="btn-speak" class="action-btn">
                <span class="icon">🔊</span>
                <span>Speak</span>
            </button>
        </section>

        <section class="settings">
            <h3>Settings</h3>

            <div class="setting-group">
                <label for="language">Language</label>
                <select id="language">
                    <option value="en">English</option>
                    <option value="ko">한국어</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="tts-rate">Speech Rate: <span id="rate-value">1.0</span>x</label>
                <input type="range" id="tts-rate" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="setting-group">
                <label for="tts-pitch">Pitch: <span id="pitch-value">1.0</span></label>
                <input type="range" id="tts-pitch" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="setting-group toggle">
                <label for="use-wihp">Use WIHP for TTS</label>
                <input type="checkbox" id="use-wihp" checked>
            </div>
        </section>

        <footer>
            <p class="philosophy">弘益人間 - Benefit All Humanity</p>
            <a href="https://wiastandards.com/screen-reader/" target="_blank">Documentation</a>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
