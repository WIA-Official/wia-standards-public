[package]
name = "wia-screen-reader"
version = "1.0.0"
edition = "2021"
authors = ["WIA Standards <official@wia.codes>"]
description = "WIA Screen Reader Standard - High-Performance Rust Engine"
license = "MIT"
repository = "https://github.com/WIA-Official/wia-standards"
homepage = "https://wiastandards.com/screen-reader/"
readme = "README.md"
keywords = ["accessibility", "screen-reader", "wia", "braille", "tts"]
categories = ["accessibility", "text-processing"]

[lib]
name = "wia_screen_reader"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
unicode-segmentation = "1.10"
lazy_static = "1.4"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "benchmarks"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
