<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WIA-ART-006 Art Authentication Standard</title>
<style>:root{--bg:#0f172a;--surface:#1e293b;--surface-2:#283548;--primary:#F59E0B;--text:#f1f5f9;--text-dim:#94a3b8;--border:#334155;--gold:#ffd700;--success:#10b981}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.8}.container{max-width:900px;margin:0 auto;padding:2rem}header{text-align:center;padding:4rem 0;border-bottom:2px solid var(--primary)}.badge{display:inline-block;background:var(--primary);color:var(--bg);padding:0.5rem 1.5rem;border-radius:2rem;font-weight:600;margin-bottom:1rem}h1{font-size:2.5rem;color:var(--primary);margin-bottom:0.5rem}.subtitle{color:var(--text-dim);font-size:1.1rem}.philosophy{text-align:center;padding:3rem;background:var(--surface);border-radius:1rem;margin:2rem 0}.philosophy-text{font-size:2rem;color:var(--gold);margin-bottom:0.5rem}.chapter-list{list-style:none;padding:0;margin:2rem 0}.chapter-list li{margin:0.75rem 0}.chapter-list a{display:block;background:var(--surface);border-left:4px solid var(--primary);padding:1.25rem 1.5rem;color:var(--text);text-decoration:none;border-radius:0 0.5rem 0.5rem 0;transition:all 0.2s}.chapter-list a:hover{background:var(--surface-2);transform:translateX(8px)}.chapter-num{color:var(--primary);font-weight:600}footer{text-align:center;padding:3rem;color:var(--text-dim);border-top:1px solid var(--border);margin-top:2rem}</style>
</head>
<body>
<div class="container">
<header><div class="badge">WIA-ART-006</div><h1>Art Authentication Standard</h1><p class="subtitle">Digital Provenance, NFT Verification & Fraud Prevention</p></header>
<div class="philosophy"><div class="philosophy-text">弘益人間</div><p>Benefit All Humanity - Protecting artists and collectors through verifiable authenticity</p></div>
</div>
</body>
</html>
