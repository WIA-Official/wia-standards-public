    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-secondary: #cbd5e1;
            --ind-color: #F59E0B;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .philosophy {
            text-align: center;
            font-size: 36px;
            letter-spacing: 3px;
            color: var(--ind-color);
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            color: var(--ind-color);
            font-size: 42px;
            margin-bottom: 20px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 20px;
            margin-bottom: 50px;
        }

        .toc {
            background: var(--bg-card);
            border: 2px solid var(--ind-color);
            border-radius: 12px;
            padding: 40px;
        }

        .toc h2 {
            color: var(--ind-color);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-item {
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg);
            border-radius: 8px;
            border-left: 4px solid var(--ind-color);
            transition: all 0.3s ease;
        }

        .toc-item:hover {
            transform: translateX(10px);
            border-left-width: 8px;
        }

        .toc-item a {
            text-decoration: none;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-number {
            background: var(--ind-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-right: 15px;
        }

        .chapter-title {
            flex: 1;
            font-size: 18px;
        }

        .arrow {
            color: var(--ind-color);
            font-size: 24px;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .back-btn {
            display: inline-block;
            background: var(--ind-color);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #D97706;
            transform: translateY(-2px);
        }
    </style>
</head>
