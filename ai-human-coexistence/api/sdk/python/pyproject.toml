[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-human-coexistence"
version = "1.0.0"
description = "WIA AI Human Coexistence Python SDK (Human detection, zone management, and safety arbitration for shared AI/human spaces)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-human-coexistence", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-human-coexistence/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_human_coexistence*"]
