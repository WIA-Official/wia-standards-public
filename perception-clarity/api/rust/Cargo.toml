[package]
name = "wia-perception-clarity"
version = "1.0.0"
edition = "2021"
authors = ["WIA Standards Team <standards@wia.live>"]
description = "WIA Perception Clarity Standard SDK — measure (PCI), state, and report physical AI sensor perception clarity"
license = "MIT"
repository = "https://github.com/WIA-Official/wia-standards"
keywords = ["perception", "sensor", "autonomous", "clarity", "safety"]
categories = ["api-bindings", "science::robotics"]

[lib]
name = "wia_perception_clarity"
path = "src/lib.rs"

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "1"

# UUID support
uuid = { version = "1", features = ["v4", "serde"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
serde_json = "1"

[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"

[[example]]
name = "report_stream"
path = "examples/report_stream.rs"
