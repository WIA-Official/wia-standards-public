[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-embodiment-ethics"
version = "1.0.0"
description = "WIA AI Embodiment Ethics Python SDK (Ethical-evaluation and consent tracking for embodied AI systems)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-embodiment-ethics", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-embodiment-ethics/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_embodiment_ethics*"]
