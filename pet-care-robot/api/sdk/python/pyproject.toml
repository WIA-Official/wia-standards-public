[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-pet-care-robot"
version = "1.0.0"
description = "WIA Pet Care Robot Python SDK (Companion-pet robotic care: feeding, monitoring, and welfare interaction)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "pet-care-robot", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/pet-care-robot/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_pet_care_robot*"]
