openapi: 3.1.0
info:
  title: WIA-AI-AFTERLIFE-ETHICS API
  version: 1.0.0
  description: |
    OpenAPI 3.1 description for the AI Afterlife Ethics standard.
    Endpoints support consent registration, persona-data lifecycle,
    and posthumous-rights queries. Authentication uses OAuth 2.1
    (RFC 9700) with mTLS for institutional callers.
servers:
  - url: https://api.example.com/wia-ai-afterlife-ethics/v1
paths:
  /consent:
    get:
      summary: List consent records
      responses:
        '200':
          description: OK
    post:
      summary: Register a new consent record
      responses:
        '201':
          description: Created
  /persona/{id}:
    get:
      summary: Retrieve persona-data manifest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '404':
          description: Not found
  /rights:
    get:
      summary: Query posthumous-rights envelope
      responses:
        '200':
          description: OK
