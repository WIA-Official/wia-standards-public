[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ocean-acidification"
version = "1.0.0"
description = "WIA Ocean Acidification Python SDK (Seawater pH/carbonate-chemistry station registration and observation submission)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ocean-acidification", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ocean-acidification/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ocean_acidification*"]
