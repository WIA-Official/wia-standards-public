<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIHP Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #059669 100%);
      color: white;
    }

    .header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .converter {
      padding: 16px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.95);
      color: #1f2937;
    }

    .input-group input:focus {
      outline: 2px solid #fbbf24;
    }

    .result {
      background: white;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-top: 12px;
    }

    .result-label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .result-hangul {
      font-size: 32px;
      color: #1e40af;
      font-weight: bold;
      margin: 8px 0;
      min-height: 40px;
    }

    .result-braille {
      font-size: 20px;
      color: #059669;
      min-height: 24px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .result-item {
      text-align: center;
      flex: 1;
    }

    .result-item .label {
      font-size: 10px;
      color: #9ca3af;
    }

    .result-item .value {
      font-size: 14px;
      color: #374151;
      font-weight: 500;
    }

    .copy-btn {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #fbbf24;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #1f2937;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #f59e0b;
      transform: scale(1.02);
    }

    .copy-btn.copied {
      background: #10b981;
      color: white;
    }

    .footer {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .footer a {
      color: #fbbf24;
      text-decoration: none;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px;
      font-size: 11px;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 18px;
      font-weight: bold;
      color: #fbbf24;
    }

    .examples {
      padding: 8px 16px;
      font-size: 11px;
      opacity: 0.8;
    }

    .examples span {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 4px;
      margin: 2px;
      cursor: pointer;
    }

    .examples span:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>WIHP</h1>
    <p>WIA International Hangul Phonology</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">188</div>
      <div>Languages</div>
    </div>
    <div class="stat">
      <div class="stat-num">7000+</div>
      <div>Coverage</div>
    </div>
  </div>

  <div class="converter">
    <div class="input-group">
      <label>Enter word or IPA:</label>
      <input type="text" id="inputText" placeholder="hello, /həˈloʊ/, こんにちは..." autofocus>
    </div>

    <div class="input-group">
      <label>Language:</label>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ar">العربية</option>
        <option value="ru">Русский</option>
        <option value="ko">한국어</option>
      </select>
    </div>

    <div class="result">
      <div class="result-label">WIHP Hangul</div>
      <div class="result-hangul" id="resultHangul">헬로</div>
      <div class="result-label">Braille</div>
      <div class="result-braille" id="resultBraille">⠓⠑⠇⠇⠕</div>

      <div class="result-row">
        <div class="result-item">
          <div class="label">Input</div>
          <div class="value" id="inputDisplay">hello</div>
        </div>
        <div class="result-item">
          <div class="label">Syllables</div>
          <div class="value" id="syllableCount">2</div>
        </div>
      </div>

      <button class="copy-btn" id="copyBtn">📋 Copy Hangul</button>
    </div>
  </div>

  <div class="examples">
    Try:
    <span onclick="tryExample('hello')">hello</span>
    <span onclick="tryExample('konnichiwa')">konnichiwa</span>
    <span onclick="tryExample('bonjour')">bonjour</span>
    <span onclick="tryExample('gracias')">gracias</span>
  </div>

  <div class="footer">
    <p>홍익인간 - Benefit All Humanity</p>
    <p>© 2025 <a href="https://github.com/WIA-Official/WIHP" target="_blank">SmileStory / WIA</a></p>
  </div>

  <script src="wihp-engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
