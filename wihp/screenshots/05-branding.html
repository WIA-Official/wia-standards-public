<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Screenshot - Branding</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1280px; 
            height: 800px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .logo { font-size: 120px; margin-bottom: 20px; }
        .title {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(90deg, #10B981, #34d399, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        .philosophy {
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        .philosophy-desc {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 50px;
        }
        .timeline {
            display: flex;
            align-items: center;
            gap: 30px;
            background: rgba(30, 41, 59, 0.8);
            padding: 25px 50px;
            border-radius: 16px;
            border: 1px solid #334155;
        }
        .timeline-item {
            text-align: center;
        }
        .timeline-year {
            font-size: 28px;
            font-weight: bold;
            color: #10B981;
        }
        .timeline-desc {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }
        .timeline-arrow {
            font-size: 30px;
            color: #334155;
        }
        .footer {
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="logo">🇰🇷</div>
    <div class="title">WIHP</div>
    <div class="subtitle">WIA International Hangul Phonology</div>
    
    <div class="philosophy">弘益人間 (홍익인간)</div>
    <div class="philosophy-desc">인류를 널리 이롭게 · Benefit All Humanity</div>
    
    <div class="timeline">
        <div class="timeline-item">
            <div class="timeline-year">1443</div>
            <div class="timeline-desc">세종대왕<br>한글 창제</div>
        </div>
        <div class="timeline-arrow">→</div>
        <div class="timeline-item">
            <div class="timeline-year">1888</div>
            <div class="timeline-desc">IPA<br>국제음성기호</div>
        </div>
        <div class="timeline-arrow">→</div>
        <div class="timeline-item">
            <div class="timeline-year">2025</div>
            <div class="timeline-desc">WIHP<br>한글의 세계화</div>
        </div>
    </div>
    
    <div class="footer">© 2025 WIA Standards · MIT License</div>
</body>
</html>
