<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Marquee Promo Tile (1400x560)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1400px; 
            height: 560px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 60px 80px;
        }
        .left {
            flex: 1;
        }
        .logo { font-size: 80px; margin-bottom: 15px; }
        .title {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(90deg, #10B981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .tagline {
            font-size: 28px;
            color: #f8fafc;
            margin-bottom: 15px;
        }
        .philosophy {
            font-size: 18px;
            color: #ffd700;
        }
        .right {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .example {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .example-flag { font-size: 32px; }
        .example-text { color: #f8fafc; font-size: 20px; }
        .example-arrow { color: #10B981; font-size: 20px; }
        .example-result { color: #10B981; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="left">
        <div class="logo">🇰🇷</div>
        <div class="title">WIHP</div>
        <div class="subtitle">WIA International Hangul Phonology</div>
        <div class="tagline">196개 언어를 한글로!</div>
        <div class="philosophy">弘益人間 · Benefit All Humanity</div>
    </div>
    
    <div class="right">
        <div class="example">
            <span class="example-flag">🇺🇸</span>
            <span class="example-text">hello</span>
            <span class="example-arrow">→</span>
            <span class="example-result">헬로우</span>
        </div>
        <div class="example">
            <span class="example-flag">🇯🇵</span>
            <span class="example-text">konnichiwa</span>
            <span class="example-arrow">→</span>
            <span class="example-result">곤니치와</span>
        </div>
        <div class="example">
            <span class="example-flag">🇫🇷</span>
            <span class="example-text">bonjour</span>
            <span class="example-arrow">→</span>
            <span class="example-result">봉주르</span>
        </div>
        <div class="example">
            <span class="example-flag">🇪🇸</span>
            <span class="example-text">gracias</span>
            <span class="example-arrow">→</span>
            <span class="example-result">그라시아스</span>
        </div>
    </div>
</body>
</html>
