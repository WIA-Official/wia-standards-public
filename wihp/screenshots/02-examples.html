<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Screenshot - Examples</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1280px; 
            height: 800px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
        }
        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: #f8fafc;
            margin-bottom: 10px;
        }
        .main-title span { color: #10B981; }
        .sub-title { color: #94a3b8; font-size: 18px; }
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 900px;
        }
        .example-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .flag { font-size: 48px; }
        .content { flex: 1; }
        .lang-name { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .original { color: #f8fafc; font-size: 20px; margin-bottom: 5px; }
        .arrow { color: #10B981; font-size: 18px; }
        .hangul { color: #10B981; font-size: 24px; font-weight: bold; }
        .philosophy {
            margin-top: 40px;
            color: #ffd700;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="title-section">
        <div class="main-title">🇰🇷 WIHP - <span>196개 언어</span>를 한글로!</div>
        <div class="sub-title">WIA International Hangul Phonology</div>
    </div>
    
    <div class="examples-grid">
        <div class="example-card">
            <div class="flag">🇺🇸</div>
            <div class="content">
                <div class="lang-name">English (영어)</div>
                <div class="original">hello</div>
                <div class="arrow">→</div>
                <div class="hangul">헬로우</div>
            </div>
        </div>
        
        <div class="example-card">
            <div class="flag">🇯🇵</div>
            <div class="content">
                <div class="lang-name">Japanese (일본어)</div>
                <div class="original">konnichiwa</div>
                <div class="arrow">→</div>
                <div class="hangul">곤니치와</div>
            </div>
        </div>
        
        <div class="example-card">
            <div class="flag">🇫🇷</div>
            <div class="content">
                <div class="lang-name">French (프랑스어)</div>
                <div class="original">bonjour</div>
                <div class="arrow">→</div>
                <div class="hangul">봉주르</div>
            </div>
        </div>
        
        <div class="example-card">
            <div class="flag">🇪🇸</div>
            <div class="content">
                <div class="lang-name">Spanish (스페인어)</div>
                <div class="original">gracias</div>
                <div class="arrow">→</div>
                <div class="hangul">그라시아스</div>
            </div>
        </div>
    </div>
    
    <div class="philosophy">弘益人間 (홍익인간) · Benefit All Humanity</div>
</body>
</html>
