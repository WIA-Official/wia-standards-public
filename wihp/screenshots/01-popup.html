<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Screenshot - Popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1280px; 
            height: 800px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .popup {
            width: 400px;
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .title { 
            font-size: 24px; 
            font-weight: bold;
            background: linear-gradient(90deg, #10B981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; }
        .label { color: #94a3b8; font-size: 14px; margin-bottom: 8px; }
        .input-box {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #10B981;
            border-radius: 10px;
            color: #f8fafc;
            font-size: 18px;
        }
        .result-box {
            width: 100%;
            padding: 20px;
            background: #0f172a;
            border: 2px solid #10B981;
            border-radius: 10px;
            text-align: center;
        }
        .result-text {
            font-size: 36px;
            font-weight: bold;
            color: #10B981;
        }
        .philosophy {
            text-align: center;
            margin-top: 20px;
            color: #ffd700;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="popup">
        <div class="header">
            <div class="logo">🇰🇷</div>
            <div class="title">WIHP</div>
            <div class="subtitle">모든 언어를 한글로 변환</div>
        </div>
        
        <div class="input-group">
            <div class="label">입력 텍스트:</div>
            <div class="input-box">hello</div>
        </div>
        
        <div class="input-group">
            <div class="label">변환 결과:</div>
            <div class="result-box">
                <span class="result-text">헬로우</span>
            </div>
        </div>
        
        <div class="philosophy">弘益人間 · Benefit All Humanity</div>
    </div>
</body>
</html>
