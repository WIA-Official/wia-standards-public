<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Screenshot - IPA Conversion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1280px; 
            height: 800px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .title {
            font-size: 38px;
            font-weight: bold;
            color: #f8fafc;
            margin-bottom: 15px;
        }
        .title span { color: #10B981; }
        .subtitle {
            color: #94a3b8;
            font-size: 18px;
            margin-bottom: 50px;
        }
        .conversion-demo {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        .box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
        }
        .box-label {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .box-content {
            font-size: 48px;
            color: #f8fafc;
        }
        .ipa { font-family: 'Segoe UI', sans-serif; }
        .hangul { color: #10B981; font-weight: bold; }
        .arrow {
            font-size: 60px;
            color: #10B981;
        }
        .explanation {
            margin-top: 50px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 20px 40px;
            color: #94a3b8;
            font-size: 16px;
        }
        .philosophy {
            margin-top: 40px;
            color: #ffd700;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="title">🔤 <span>IPA</span> → 한글 자동 변환</div>
    <div class="subtitle">국제음성기호(IPA)를 입력하면 정확한 한글 발음으로!</div>
    
    <div class="conversion-demo">
        <div class="box">
            <div class="box-label">IPA 입력</div>
            <div class="box-content ipa">/həˈloʊ/</div>
        </div>
        
        <div class="arrow">→</div>
        
        <div class="box">
            <div class="box-label">한글 변환</div>
            <div class="box-content hangul">헬로우</div>
        </div>
    </div>
    
    <div class="explanation">
        💡 IPA 기호를 몰라도 OK! 로마자(hello)만 입력해도 자동 변환됩니다
    </div>
    
    <div class="philosophy">弘益人間 · Benefit All Humanity</div>
</body>
</html>
