<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WIHP Small Promo Tile (440x280)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 440px; 
            height: 280px; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        .title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #10B981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 8px;
        }
        .tagline {
            margin-top: 15px;
            font-size: 18px;
            color: #f8fafc;
        }
        .philosophy {
            margin-top: 12px;
            font-size: 12px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="logo">🇰🇷</div>
    <div class="title">WIHP</div>
    <div class="subtitle">WIA International Hangul Phonology</div>
    <div class="tagline">196개 언어 → 한글 변환</div>
    <div class="philosophy">弘益人間 · Benefit All Humanity</div>
</body>
</html>
