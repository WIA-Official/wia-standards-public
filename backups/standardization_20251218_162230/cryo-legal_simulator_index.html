<script>
const CryoLegalSimulator = (function() {
    // Legal Status Types
    const LegalStatus = {
        LIVING: 'LIVING',
        LEGALLY_DECEASED: 'LEGALLY_DECEASED',
        PRESERVED_STATUS: 'PRESERVED_STATUS',
        REVIVAL_PENDING: 'REVIVAL_PENDING',
        LEGALLY_RESTORED: 'LEGALLY_RESTORED',
        PERMANENT_DEATH: 'PERMANENT_DEATH'
    };

    // Document Types
    const DocumentType = {
        DEATH_CERTIFICATE: 'DEATH_CERTIFICATE',
        PRESERVATION_DECLARATION: 'PRESERVATION_DECLARATION',
        RESTORATION_CERTIFICATE: 'RESTORATION_CERTIFICATE',
        COURT_ORDER: 'COURT_ORDER',
        GUARDIANSHIP_ORDER: 'GUARDIANSHIP_ORDER',
        TRUST_DOCUMENT: 'TRUST_DOCUMENT',
        POWER_OF_ATTORNEY: 'POWER_OF_ATTORNEY',
        IDENTITY_VERIFICATION: 'IDENTITY_VERIFICATION'
    };

    // Document Status
    const DocumentStatus = {
        DRAFT: 'DRAFT',
        PENDING_SIGNATURE: 'PENDING_SIGNATURE',
        SIGNED: 'SIGNED',
        NOTARIZED: 'NOTARIZED',
        FILED: 'FILED',
        APOSTILLED: 'APOSTILLED',
        ACTIVE: 'ACTIVE',
        SUPERSEDED: 'SUPERSEDED',
        REVOKED: 'REVOKED'
    };

    // Restoration Stages
    const RestorationStage = {
        INITIATED: 'INITIATED',
        IDENTITY_VERIFICATION: 'IDENTITY_VERIFICATION',
        MEDICAL_CLEARANCE: 'MEDICAL_CLEARANCE',
        LEGAL_REVIEW: 'LEGAL_REVIEW',
        COURT_PETITION: 'COURT_PETITION',
        COURT_HEARING: 'COURT_HEARING',
        RESTORATION_GRANTED: 'RESTORATION_GRANTED',
        RIGHTS_RESTORATION: 'RIGHTS_RESTORATION',
        COMPLETED: 'COMPLETED'
    };

    // Recognition Status
    const RecognitionStatus = {
        FULL: 'FULL',
        PARTIAL: 'PARTIAL',
        PENDING: 'PENDING',
        NOT_RECOGNIZED: 'NOT_RECOGNIZED'
    };

    // Guardianship Scope
    const GuardianshipScope = {
        PERSONAL: 'personal_decisions',
        MEDICAL: 'medical_decisions',
        FINANCIAL: 'financial_decisions',
        LEGAL: 'legal_representation',
        REVIVAL: 'revival_decisions'
    };

    // Valid Status Transitions
    const validTransitions = {
        [LegalStatus.LIVING]: [LegalStatus.LEGALLY_DECEASED],
        [LegalStatus.LEGALLY_DECEASED]: [LegalStatus.PRESERVED_STATUS],
        [LegalStatus.PRESERVED_STATUS]: [LegalStatus.REVIVAL_PENDING, LegalStatus.PERMANENT_DEATH],
        [LegalStatus.REVIVAL_PENDING]: [LegalStatus.LEGALLY_RESTORED, LegalStatus.PRESERVED_STATUS, LegalStatus.PERMANENT_DEATH],
        [LegalStatus.LEGALLY_RESTORED]: [],
        [LegalStatus.PERMANENT_DEATH]: []
    };

    // State
    let state = {
        records: [],
        documents: [],
        jurisdictions: [],
        restorations: [],
        guardianships: [],
        currentSection: 'main'
    };

    // Sample Jurisdictions
    const sampleJurisdictions = [
        { code: 'US-CA', name: 'California, USA', treatyMember: true, recognitionStatus: RecognitionStatus.FULL },
        { code: 'US-AZ', name: 'Arizona, USA', treatyMember: true, recognitionStatus: RecognitionStatus.FULL },
        { code: 'CH', name: 'Switzerland', treatyMember: true, recognitionStatus: RecognitionStatus.FULL },
        { code: 'KR', name: 'South Korea', treatyMember: true, recognitionStatus: RecognitionStatus.FULL },
        { code: 'JP', name: 'Japan', treatyMember: false, recognitionStatus: RecognitionStatus.PARTIAL },
        { code: 'AU', name: 'Australia', treatyMember: false, recognitionStatus: RecognitionStatus.PENDING },
        { code: 'GB', name: 'United Kingdom', treatyMember: true, recognitionStatus: RecognitionStatus.FULL }
    ];

    // Utility Functions
    function generateId(prefix) {
        return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function formatDate(date) {
        return date.toISOString().split('T')[0];
    }

    function formatDateTime(date) {
        return date.toISOString().replace('T', ' ').substr(0, 19);
    }

    // Legal Status Record Class
    class LegalStatusRecord {
        constructor(subjectName, identityId, jurisdiction) {
            this.recordId = generateId('LSR');
            this.subjectId = generateId('SUB');
            this.subjectName = subjectName;
            this.identityId = identityId;
            this.currentStatus = LegalStatus.LIVING;
            this.statusHistory = [{
                fromStatus: null,
                toStatus: LegalStatus.LIVING,
                timestamp: new Date(),
                authority: 'SYSTEM',
                reason: 'Initial record creation'
            }];
            this.primaryJurisdiction = jurisdiction;
            this.jurisdictions = [jurisdiction];
            this.documents = [];
            this.guardianship = null;
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        canTransitionTo(newStatus) {
            return validTransitions[this.currentStatus].includes(newStatus);
        }

        transition(newStatus, authority, reason, documents = []) {
            if (!this.canTransitionTo(newStatus)) {
                throw new Error(`Invalid transition from ${this.currentStatus} to ${newStatus}`);
            }

            const transition = {
                fromStatus: this.currentStatus,
                toStatus: newStatus,
                timestamp: new Date(),
                authority: authority,
                reason: reason,
                documentIds: documents
            };

            this.statusHistory.push(transition);
            this.currentStatus = newStatus;
            this.updatedAt = new Date();

            return transition;
        }
    }

    // Document Class
    class LegalDocument {
        constructor(type, recordId, title, jurisdiction) {
            this.documentId = generateId('DOC');
            this.type = type;
            this.recordId = recordId;
            this.title = title;
            this.jurisdiction = jurisdiction;
            this.status = DocumentStatus.DRAFT;
            this.signatures = [];
            this.notarization = null;
            this.apostille = null;
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        sign(signerName, signerRole) {
            if (this.status !== DocumentStatus.DRAFT && this.status !== DocumentStatus.PENDING_SIGNATURE) {
                throw new Error(`Cannot sign document in ${this.status} status`);
            }

            this.signatures.push({
                signerName: signerName,
                signerRole: signerRole,
                timestamp: new Date(),
                signatureHash: generateId('SIG')
            });

            this.status = DocumentStatus.SIGNED;
            this.updatedAt = new Date();
        }

        notarize(notaryName, notaryId, jurisdiction) {
            if (this.status !== DocumentStatus.SIGNED) {
                throw new Error('Document must be signed before notarization');
            }

            this.notarization = {
                notaryName: notaryName,
                notaryId: notaryId,
                jurisdiction: jurisdiction,
                timestamp: new Date(),
                sealNumber: generateId('SEAL')
            };

            this.status = DocumentStatus.NOTARIZED;
            this.updatedAt = new Date();
        }

        apostille(issuingAuthority, destinationCountry) {
            if (this.status !== DocumentStatus.NOTARIZED && this.status !== DocumentStatus.FILED) {
                throw new Error('Document must be notarized before apostille');
            }

            this.apostille = {
                issuingAuthority: issuingAuthority,
                destinationCountry: destinationCountry,
                timestamp: new Date(),
                certificateNumber: generateId('APO')
            };

            this.status = DocumentStatus.APOSTILLED;
            this.updatedAt = new Date();
        }
    }

    // Restoration Workflow Class
    class RestorationWorkflow {
        constructor(recordId, initiatedBy) {
            this.workflowId = generateId('RWF');
            this.recordId = recordId;
            this.stage = RestorationStage.INITIATED;
            this.initiatedBy = initiatedBy;
            this.stages = [{
                stage: RestorationStage.INITIATED,
                timestamp: new Date(),
                completedBy: initiatedBy,
                notes: 'Restoration workflow initiated'
            }];
            this.tasks = this.generateTasks();
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        generateTasks() {
            return [
                { taskId: generateId('TSK'), stage: RestorationStage.IDENTITY_VERIFICATION, description: 'Verify biological identity', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.IDENTITY_VERIFICATION, description: 'Verify legal identity documents', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.MEDICAL_CLEARANCE, description: 'Complete medical evaluation', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.MEDICAL_CLEARANCE, description: 'Obtain cognitive assessment', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.LEGAL_REVIEW, description: 'Review all legal documents', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.LEGAL_REVIEW, description: 'Verify jurisdiction compliance', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.COURT_PETITION, description: 'Prepare court petition', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.COURT_PETITION, description: 'File with appropriate court', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.COURT_HEARING, description: 'Attend court hearing', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.RESTORATION_GRANTED, description: 'Obtain court order', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.RIGHTS_RESTORATION, description: 'Restore civil rights', status: 'pending' },
                { taskId: generateId('TSK'), stage: RestorationStage.RIGHTS_RESTORATION, description: 'Update government records', status: 'pending' }
            ];
        }

        advanceStage(completedBy, notes) {
            const stageOrder = Object.values(RestorationStage);
            const currentIndex = stageOrder.indexOf(this.stage);

            if (currentIndex >= stageOrder.length - 1) {
                throw new Error('Workflow already completed');
            }

            const nextStage = stageOrder[currentIndex + 1];

            this.stages.push({
                stage: nextStage,
                timestamp: new Date(),
                completedBy: completedBy,
                notes: notes
            });

            this.stage = nextStage;
            this.updatedAt = new Date();

            return nextStage;
        }

        completeTask(taskId, completedBy) {
            const task = this.tasks.find(t => t.taskId === taskId);
            if (!task) throw new Error('Task not found');

            task.status = 'completed';
            task.completedBy = completedBy;
            task.completedAt = new Date();
            this.updatedAt = new Date();

            return task;
        }
    }

    // Guardianship Class
    class Guardianship {
        constructor(recordId, guardianName, guardianId, scope) {
            this.guardianshipId = generateId('GRD');
            this.recordId = recordId;
            this.guardian = {
                name: guardianName,
                guardianId: guardianId,
                appointedAt: new Date()
            };
            this.scope = scope;
            this.status = 'ACTIVE';
            this.courtOrder = null;
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        addCourtOrder(orderNumber, court, judge) {
            this.courtOrder = {
                orderNumber: orderNumber,
                court: court,
                judge: judge,
                issuedAt: new Date()
            };
            this.updatedAt = new Date();
        }

        terminate(reason, terminatedBy) {
            this.status = 'TERMINATED';
            this.terminatedAt = new Date();
            this.terminationReason = reason;
            this.terminatedBy = terminatedBy;
            this.updatedAt = new Date();
        }
    }

    function renderTransitionsSection() {
        let transitionHistory = '';
        state.records.forEach(record => {
            record.statusHistory.forEach(trans => {
                transitionHistory += `
    ${formatDateTime(trans.timestamp)}
        Record:   ${record.recordId} (${record.subjectName})
        From:     ${trans.fromStatus || 'N/A'}
        To:       ${trans.toStatus}
        By:       ${trans.authority}
        Reason:   ${trans.reason}
`;

        });

        if (!transitionHistory) {
            transitionHistory = '    No transitions recorded.\n';

        const output = `

    function checkRecognition() {
        const fromJur = document.getElementById('fromJur').value;
        const toJur = document.getElementById('toJur').value;

        const fromInfo = sampleJurisdictions.find(j => j.code === fromJur);
        const toInfo = sampleJurisdictions.find(j => j.code === toJur);

        let result = '';

        if (fromInfo && toInfo) {
            const bothTreaty = fromInfo.treatyMember && toInfo.treatyMember;
            const recognition = bothTreaty ? RecognitionStatus.FULL :
                               (fromInfo.treatyMember || toInfo.treatyMember) ? RecognitionStatus.PARTIAL :
                               RecognitionStatus.PENDING;

            result = `
    RECOGNITION CHECK RESULT
    ========================

    From: ${fromInfo.name} (${fromInfo.code})
        Treaty Member: ${fromInfo.treatyMember ? 'Yes' : 'No'}
        Status: ${fromInfo.recognitionStatus}

    To: ${toInfo.name} (${toInfo.code})
        Treaty Member: ${toInfo.treatyMember ? 'Yes' : 'No'}
        Status: ${toInfo.recognitionStatus}

    Mutual Recognition: ${recognition}

    ${bothTreaty ?
        '[OK] Full mutual recognition under ICLST treaty' :
        '[!] Limited recognition - additional documentation may be required'}
`;
        }

        alert(result);
    }

    function advanceWorkflow(workflowId) {
        const workflow = state.restorations.find(w => w.workflowId === workflowId);
        if (!workflow) {
            alert('Workflow not found');
            return;
        }

        const completedBy = prompt('Completed by:', 'Legal Officer');
        const notes = prompt('Notes:', 'Stage requirements met');

        if (completedBy) {
            try {
                const newStage = workflow.advanceStage(completedBy, notes);
                alert(`Advanced to stage: ${newStage}`);

                // If restoration is granted, update the record status
                if (newStage === RestorationStage.COMPLETED) {
                    const record = state.records.find(r => r.recordId === workflow.recordId);
                    if (record && record.currentStatus === LegalStatus.REVIVAL_PENDING) {
                        record.transition(LegalStatus.LEGALLY_RESTORED, completedBy, 'Restoration workflow completed');
                    }
                }

                viewWorkflow(workflowId);
            } catch (error) {
                alert('Advance failed: ' + error.message);
            }
        }
    }

    function completeWorkflowTask(workflowId) {
        const workflow = state.restorations.find(w => w.workflowId === workflowId);
        if (!workflow) {
            alert('Workflow not found');
            return;
        }

        const pendingTasks = workflow.tasks.filter(t => t.status === 'pending');
        if (pendingTasks.length === 0) {
            alert('All tasks completed');
            return;
        }

        const taskList = pendingTasks.map((t, i) => `${i + 1}. ${t.description}`).join('\n');
        const selection = prompt(`Select task to complete:\n${taskList}`, '1');

        if (selection) {
            const index = parseInt(selection) - 1;
            if (index >= 0 && index < pendingTasks.length) {
                const completedBy = prompt('Completed by:', 'Legal Officer');
                if (completedBy) {
                    workflow.completeTask(pendingTasks[index].taskId, completedBy);
                    alert('Task completed');
                    viewWorkflow(workflowId);
                }
            }
        }
    }

            state.records.filter(r => r.currentStatus === status) :
            state.records;

        displayQueryResults(results, `Status: ${status || 'All'}`);
    }

    function queryByJurisdiction() {
        const jurisdiction = document.getElementById('queryJurisdiction').value;
        const results = jurisdiction ?
            state.records.filter(r => r.primaryJurisdiction === jurisdiction) :
            state.records;

        displayQueryResults(results, `Jurisdiction: ${jurisdiction || 'All'}`);
    }

    function queryByName() {
        const name = document.getElementById('queryName').value.toLowerCase();
        const results = name ?
            state.records.filter(r => r.subjectName.toLowerCase().includes(name)) :
            state.records;

        displayQueryResults(results, `Name contains: "${name}"`);
    }

    function displayQueryResults(records, criteria) {
        let html = `    Query: ${criteria}\n    Found: ${records.length} records\n\n`;

        if (records.length === 0) {
            html += '    No records found matching criteria.\n';
        } else {
            records.forEach(record => {
                html += `    ${record.recordId} | ${record.subjectName} | ${record.currentStatus} | ${record.primaryJurisdiction}\n`;
            });
        }

        document.getElementById('queryResults').innerText = html;
    }

    function showSection(section) {
        state.currentSection = section;
        switch(section) {
            case 'main': renderMainMenu(); break;
            case 'records': renderRecordsSection(); break;
            case 'documents': renderDocumentsSection(); break;
            case 'jurisdictions': renderJurisdictionsSection(); break;
            case 'restoration': renderRestorationSection(); break;
            case 'guardianship': renderGuardianshipSection(); break;
            case 'transitions': renderTransitionsSection(); break;
            case 'dashboard': renderDashboard(); break;
            case 'query': renderQuerySection(); break;
            default: renderMainMenu();
        }
    }

    // Initialize
    function init() {
        // Load sample data
        state.jurisdictions = sampleJurisdictions;
        renderMainMenu();
    }

    // Public API
    return {
        init: init,
        showSection: showSection,
        createRecord: createRecord,
        viewRecord: viewRecord,
        showTransitionForm: showTransitionForm,
        executeTransition: executeTransition,
        createDocument: createDocument,
        createDocumentForRecord: createDocumentForRecord,
        viewDocument: viewDocument,
        processDocument: processDocument,
        signDocument: signDocument,
        notarizeDocument: notarizeDocument,
        apostilleDocument: apostilleDocument,
        checkRecognition: checkRecognition,
        initiateRestoration: initiateRestoration,
        viewWorkflow: viewWorkflow,
        advanceWorkflow: advanceWorkflow,
        completeWorkflowTask: completeWorkflowTask,
        appointGuardian: appointGuardian,
        viewGuardianship: viewGuardianship,
        addCourtOrder: addCourtOrder,
        terminateGuardianship: terminateGuardianship,
        queryByStatus: queryByStatus,
        queryByJurisdiction: queryByJurisdiction,
        queryByName: queryByName
    };
})();

// Initialize on load
window.onload = CryoLegalSimulator.init;
</script>
</body>
</html>
