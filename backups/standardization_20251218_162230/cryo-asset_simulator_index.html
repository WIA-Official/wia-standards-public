<script>
const CryoAssetSimulator = (function() {
    // Registry Status Types
    const RegistryStatus = {
        ACTIVE: 'ACTIVE',
        FROZEN: 'FROZEN',
        TRUST_MANAGED: 'TRUST_MANAGED',
        RESTORATION_PENDING: 'RESTORATION_PENDING',
        RESTORED: 'RESTORED',
        ESTATE_DISTRIBUTED: 'ESTATE_DISTRIBUTED'
    };

    // Asset Types
    const AssetType = {
        REAL_PROPERTY: 'REAL_PROPERTY',
        FINANCIAL_ACCOUNT: 'FINANCIAL_ACCOUNT',
        INVESTMENT_PORTFOLIO: 'INVESTMENT_PORTFOLIO',
        CRYPTOCURRENCY: 'CRYPTOCURRENCY',
        INTELLECTUAL_PROPERTY: 'INTELLECTUAL_PROPERTY',
        BUSINESS_INTEREST: 'BUSINESS_INTEREST',
        PERSONAL_PROPERTY: 'PERSONAL_PROPERTY'
    };

    // Asset Status
    const AssetStatus = {
        ACTIVE: 'ACTIVE',
        FROZEN: 'FROZEN',
        UNDER_MANAGEMENT: 'UNDER_MANAGEMENT',
        LIQUIDATING: 'LIQUIDATING',
        TRANSFERRED: 'TRANSFERRED',
        DISPOSED: 'DISPOSED'
    };

    // Trust Status
    const TrustStatus = {
        ACTIVE: 'ACTIVE',
        SUSPENDED: 'SUSPENDED',
        TERMINATED: 'TERMINATED',
        DISSOLVED: 'DISSOLVED'
    };

    // Valid Transitions
    const validTransitions = {
        [RegistryStatus.ACTIVE]: [RegistryStatus.FROZEN],
        [RegistryStatus.FROZEN]: [RegistryStatus.TRUST_MANAGED],
        [RegistryStatus.TRUST_MANAGED]: [RegistryStatus.RESTORATION_PENDING, RegistryStatus.ESTATE_DISTRIBUTED],
        [RegistryStatus.RESTORATION_PENDING]: [RegistryStatus.RESTORED, RegistryStatus.TRUST_MANAGED],
        [RegistryStatus.RESTORED]: [],
        [RegistryStatus.ESTATE_DISTRIBUTED]: []
    };

    // State
    let state = {
        registries: [],
        assets: [],
        trusts: [],
        valuations: [],
        distributions: [],
        currentSection: 'main'
    };

    // Utility Functions
    function generateId(prefix) {
        return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function formatDate(date) {
        return date.toISOString().split('T')[0];
    }

    function formatCurrency(amount, currency = 'USD') {
        return currency + ' ' + amount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Asset Registry Class
    class AssetRegistry {
        constructor(subjectName, subjectId, legalRecordId) {
            this.registryId = generateId('REG');
            this.subjectName = subjectName;
            this.subjectId = subjectId;
            this.legalRecordId = legalRecordId;
            this.status = RegistryStatus.ACTIVE;
            this.statusHistory = [{
                fromStatus: null,
                toStatus: RegistryStatus.ACTIVE,
                timestamp: new Date(),
                triggeredBy: 'SYSTEM',
                reason: 'Registry created'
            }];
            this.assets = [];
            this.trusts = [];
            this.guardian = null;
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        canTransitionTo(newStatus) {
            return validTransitions[this.status].includes(newStatus);
        }

        transition(newStatus, triggeredBy, reason) {
            if (!this.canTransitionTo(newStatus)) {
                throw new Error(`Invalid transition from ${this.status} to ${newStatus}`);
            }

            this.statusHistory.push({
                fromStatus: this.status,
                toStatus: newStatus,
                timestamp: new Date(),
                triggeredBy: triggeredBy,
                reason: reason
            });

            this.status = newStatus;
            this.updatedAt = new Date();

            // Execute status-specific actions
            this._executeTransitionActions(newStatus);
        }

        _executeTransitionActions(newStatus) {
            const registryAssets = state.assets.filter(a => a.registryId === this.registryId);

            switch(newStatus) {
                case RegistryStatus.FROZEN:
                    registryAssets.forEach(a => a.freeze());
                    break;
                case RegistryStatus.TRUST_MANAGED:
                    registryAssets.forEach(a => a.setStatus(AssetStatus.UNDER_MANAGEMENT));
                    break;
                case RegistryStatus.RESTORED:
                    registryAssets.forEach(a => a.setStatus(AssetStatus.TRANSFERRED));
                    break;
                case RegistryStatus.ESTATE_DISTRIBUTED:
                    registryAssets.forEach(a => {
                        if (a.status !== AssetStatus.DISPOSED) {
                            a.setStatus(AssetStatus.LIQUIDATING);
                        }
                    });
                    break;
            }
        }

        getTotalValue(currency = 'USD') {
            const registryAssets = state.assets.filter(a => a.registryId === this.registryId);
            return registryAssets.reduce((sum, a) => sum + a.value.amount, 0);
        }
    }

    // Asset Class
    class Asset {
        constructor(registryId, type, name, value, jurisdiction) {
            this.assetId = generateId('AST');
            this.registryId = registryId;
            this.type = type;
            this.name = name;
            this.value = { amount: value, currency: 'USD', asOf: new Date() };
            this.jurisdiction = jurisdiction;
            this.status = AssetStatus.ACTIVE;
            this.history = [];
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        freeze() {
            this.setStatus(AssetStatus.FROZEN);
        }

        setStatus(newStatus) {
            this.history.push({
                eventType: 'STATUS_CHANGE',
                previousValue: this.status,
                newValue: newStatus,
                timestamp: new Date()
            });
            this.status = newStatus;
            this.updatedAt = new Date();
        }

        updateValue(newValue) {
            this.history.push({
                eventType: 'VALUATION',
                previousValue: this.value.amount,
                newValue: newValue,
                timestamp: new Date()
            });
            this.value = { amount: newValue, currency: 'USD', asOf: new Date() };
            this.updatedAt = new Date();
        }
    }

    // Trust Class
    class Trust {
        constructor(registryId, trustName, trustType) {
            this.trustId = generateId('TRT');
            this.registryId = registryId;
            this.trustName = trustName;
            this.trustType = trustType;
            this.status = TrustStatus.ACTIVE;
            this.trustees = [];
            this.beneficiaries = [];
            this.distributions = [];
            this.preservationReserve = 0;
            this.createdAt = new Date();
            this.updatedAt = new Date();
        }

        addTrustee(name, role, type) {
            this.trustees.push({
                trusteeId: generateId('TRE'),
                name: name,
                role: role,
                type: type,
                appointmentDate: new Date()
            });
            this.updatedAt = new Date();
        }

        addBeneficiary(name, relationship, share, benefitType) {
            const totalShare = this.beneficiaries.reduce((sum, b) => sum + b.share, 0);
            if (totalShare + share > 1) {
                throw new Error('Total beneficiary shares exceed 100%');
            }

            this.beneficiaries.push({
                beneficiaryId: generateId('BEN'),
                name: name,
                relationship: relationship,
                share: share,
                benefitType: benefitType
            });
            this.updatedAt = new Date();
        }

        distribute(beneficiaryId, amount, type, reason) {
            const distribution = {
                distributionId: generateId('DST'),
                beneficiaryId: beneficiaryId,
                amount: amount,
                type: type,
                reason: reason,
                date: new Date(),
                status: 'COMPLETED'
            };
            this.distributions.push(distribution);
            this.updatedAt = new Date();
            return distribution;
        }

        fundPreservationReserve(amount) {
            this.preservationReserve += amount;
            this.updatedAt = new Date();
        }

        terminate(reason) {
            this.status = TrustStatus.TERMINATED;
            this.terminationReason = reason;
            this.terminatedAt = new Date();
            this.updatedAt = new Date();
        }
    }

    // Render Functions
    function render(content) {

    }

    // Action Functions
    function createRegistry() {
        const name = document.getElementById('subjectName').value;
        const subjectId = document.getElementById('subjectId').value;
        const legalRecordId = document.getElementById('legalRecordId').value;

        if (!name || !subjectId || !legalRecordId) {
            alert('Please fill in all required fields');
            return;
        }

        const registry = new AssetRegistry(name, subjectId, legalRecordId);
        state.registries.push(registry);

        alert(`Registry created: ${registry.registryId}`);
        renderRegistriesSection();
    }

    function viewRegistry(registryId) {
        const registry = state.registries.find(r => r.registryId === registryId);
        if (!registry) {
            alert('Registry not found');
            return;
        }

        const registryAssets = state.assets.filter(a => a.registryId === registryId);
        const registryTrusts = state.trusts.filter(t => t.registryId === registryId);
        const totalValue = registry.getTotalValue();

        let assetsDisplay = registryAssets.length > 0 ?
            registryAssets.map(a => `        ${a.name}: ${formatCurrency(a.value.amount)} (${a.status})`).join('\n') :
            '        No assets';

        let trustsDisplay = registryTrusts.length > 0 ?
            registryTrusts.map(t => `        ${t.trustName} (${t.status})`).join('\n') :
            '        No trusts';

        let historyDisplay = registry.statusHistory.map(h =>
            `        ${formatDate(h.timestamp)}: ${h.fromStatus || 'N/A'} --> ${h.toStatus} (${h.triggeredBy})`
        ).join('\n');

        const output = `
================================================================================
REGISTRY DETAILS: ${registry.registryId}
================================================================================

<a href="#" onclick="CryoAssetSimulator.showSection('registries')">[Back to Registries]</a>

--------------------------------------------------------------------------------
BASIC INFORMATION
--------------------------------------------------------------------------------

    Registry ID:    ${registry.registryId}
    Subject:        ${registry.subjectName}
    Subject ID:     ${registry.subjectId}
    Legal Record:   ${registry.legalRecordId}
    Status:         ${registry.status}
    Total Value:    ${formatCurrency(totalValue)}
    Created:        ${formatDate(registry.createdAt)}

--------------------------------------------------------------------------------
ASSETS (${registryAssets.length})
--------------------------------------------------------------------------------

${assetsDisplay}

--------------------------------------------------------------------------------
TRUSTS (${registryTrusts.length})
--------------------------------------------------------------------------------

${trustsDisplay}

--------------------------------------------------------------------------------
STATUS HISTORY
--------------------------------------------------------------------------------

${historyDisplay}

--------------------------------------------------------------------------------
ACTIONS
--------------------------------------------------------------------------------

    <a href="#" onclick="CryoAssetSimulator.showTransitionForm('${registryId}')">[Transition Status]</a>
    <a href="#" onclick="CryoAssetSimulator.showSection('registries')">[Back]</a>

================================================================================
`;
        render(output);
    }

    function showTransitionForm(registryId) {
        const registry = state.registries.find(r => r.registryId === registryId);
        if (!registry) return;

        const possibleTransitions = validTransitions[registry.status];
        let transitionOptions = '';
        possibleTransitions.forEach(status => {
            transitionOptions += `<option value="${status}">${status}</option>`;
        });

        if (possibleTransitions.length === 0) {
            transitionOptions = '<option value="">No transitions available (terminal state)</option>';
        }

        const output = `
================================================================================
STATUS TRANSITION: ${registry.registryId}
================================================================================

<a href="#" onclick="CryoAssetSimulator.viewRegistry('${registryId}')">[Back to Registry]</a>

--------------------------------------------------------------------------------
CURRENT STATUS
--------------------------------------------------------------------------------

    Registry:     ${registry.registryId}
    Subject:      ${registry.subjectName}
    Status:       ${registry.status}

--------------------------------------------------------------------------------
TRANSITION FORM
--------------------------------------------------------------------------------

    New Status:   <select id="newStatus">${transitionOptions}</select>
    Triggered By: <input type="text" id="transTriggeredBy" size="30" value="Guardian">
    Reason:       <input type="text" id="transReason" size="50" value="Status transition">

    <a href="#" onclick="CryoAssetSimulator.executeTransition('${registryId}')">[Execute Transition]</a>

--------------------------------------------------------------------------------
VALID TRANSITIONS FROM ${registry.status}
--------------------------------------------------------------------------------

${possibleTransitions.length > 0 ?
    possibleTransitions.map(s => `    --> ${s}`).join('\n') :
    '    (Terminal state - no further transitions possible)'}

================================================================================
`;
        render(output);
    }

    function executeTransition(registryId) {
        const registry = state.registries.find(r => r.registryId === registryId);
        if (!registry) return;

        const newStatus = document.getElementById('newStatus').value;
        const triggeredBy = document.getElementById('transTriggeredBy').value;
        const reason = document.getElementById('transReason').value;

        if (!newStatus) {
            alert('Please select a new status');
            return;
        }

        try {
            registry.transition(newStatus, triggeredBy, reason);
            alert(`Status transitioned to ${newStatus}`);
            viewRegistry(registryId);
        } catch (error) {
            alert('Transition failed: ' + error.message);
        }
    }

    function createAsset() {
        const registryId = document.getElementById('assetRegistryId').value;
        const type = document.getElementById('assetType').value;
        const name = document.getElementById('assetName').value;
        const value = parseFloat(document.getElementById('assetValue').value);
        const jurisdiction = document.getElementById('assetJurisdiction').value;

        if (!registryId || !name || isNaN(value)) {
            alert('Please fill in all required fields');
            return;
        }

        const asset = new Asset(registryId, type, name, value, jurisdiction);
        state.assets.push(asset);

        const registry = state.registries.find(r => r.registryId === registryId);
        if (registry) {
            registry.assets.push(asset.assetId);
        }

        alert(`Asset created: ${asset.assetId}`);
        renderAssetsSection();
    }

    function viewAsset(assetId) {
        const asset = state.assets.find(a => a.assetId === assetId);
        if (!asset) return;

        const registry = state.registries.find(r => r.registryId === asset.registryId);

        let historyDisplay = asset.history.length > 0 ?
            asset.history.map(h =>
                `        ${formatDate(h.timestamp)}: ${h.eventType} - ${h.previousValue} --> ${h.newValue}`
            ).join('\n') :
            '        No history';

        const output = `
================================================================================
ASSET DETAILS: ${asset.assetId}
================================================================================

<a href="#" onclick="CryoAssetSimulator.showSection('assets')">[Back to Assets]</a>

--------------------------------------------------------------------------------
BASIC INFORMATION
--------------------------------------------------------------------------------

    Asset ID:     ${asset.assetId}
    Name:         ${asset.name}
    Type:         ${asset.type}
    Value:        ${formatCurrency(asset.value.amount)}
    Status:       ${asset.status}
    Jurisdiction: ${asset.jurisdiction}
    Registry:     ${registry ? registry.subjectName : asset.registryId}
    Created:      ${formatDate(asset.createdAt)}
    Updated:      ${formatDate(asset.updatedAt)}

--------------------------------------------------------------------------------
VALUE HISTORY
--------------------------------------------------------------------------------

${historyDisplay}

--------------------------------------------------------------------------------
ACTIONS
--------------------------------------------------------------------------------

    <a href="#" onclick="CryoAssetSimulator.updateAssetValue('${assetId}')">[Update Value]</a>
    <a href="#" onclick="CryoAssetSimulator.showSection('assets')">[Back]</a>

================================================================================
`;
        render(output);
    }

    function updateAssetValue(assetId) {
        const asset = state.assets.find(a => a.assetId === assetId);
        if (!asset) return;

        const newValue = prompt(`Enter new value for ${asset.name} (current: ${asset.value.amount}):`, asset.value.amount);
        if (newValue !== null && !isNaN(parseFloat(newValue))) {
            asset.updateValue(parseFloat(newValue));
            alert('Asset value updated');
            viewAsset(assetId);
        }
    }

    function createTrust() {
        const registryId = document.getElementById('trustRegistryId').value;
        const trustName = document.getElementById('trustName').value;
        const trustType = document.getElementById('trustType').value;

        if (!registryId || !trustName) {
            alert('Please fill in all required fields');
            return;
        }

        const trust = new Trust(registryId, trustName, trustType);
        state.trusts.push(trust);

        const registry = state.registries.find(r => r.registryId === registryId);
        if (registry) {
            registry.trusts.push(trust.trustId);
        }

        alert(`Trust created: ${trust.trustId}`);
        renderTrustsSection();
    }

    function viewTrust(trustId) {
        const trust = state.trusts.find(t => t.trustId === trustId);
        if (!trust) return;

        const registry = state.registries.find(r => r.registryId === trust.registryId);

        let trusteesDisplay = trust.trustees.length > 0 ?
            trust.trustees.map(t => `        ${t.name} (${t.role})`).join('\n') :
            '        No trustees appointed';

        let beneficiariesDisplay = trust.beneficiaries.length > 0 ?
            trust.beneficiaries.map(b => `        ${b.name}: ${(b.share * 100).toFixed(0)}% (${b.benefitType})`).join('\n') :
            '        No beneficiaries';

        let distributionsDisplay = trust.distributions.length > 0 ?
            trust.distributions.map(d => `        ${formatDate(d.date)}: ${formatCurrency(d.amount)} to ${d.beneficiaryId}`).join('\n') :
            '        No distributions';

        const output = `
================================================================================
TRUST DETAILS: ${trust.trustId}
================================================================================

<a href="#" onclick="CryoAssetSimulator.showSection('trusts')">[Back to Trusts]</a>

--------------------------------------------------------------------------------
BASIC INFORMATION
--------------------------------------------------------------------------------

    Trust ID:     ${trust.trustId}
    Name:         ${trust.trustName}
    Type:         ${trust.trustType}
    Status:       ${trust.status}
    Registry:     ${registry ? registry.subjectName : trust.registryId}
    Reserve:      ${formatCurrency(trust.preservationReserve)}
    Created:      ${formatDate(trust.createdAt)}

--------------------------------------------------------------------------------
TRUSTEES
--------------------------------------------------------------------------------

${trusteesDisplay}

--------------------------------------------------------------------------------
BENEFICIARIES
--------------------------------------------------------------------------------

${beneficiariesDisplay}

--------------------------------------------------------------------------------
DISTRIBUTIONS
--------------------------------------------------------------------------------

${distributionsDisplay}

--------------------------------------------------------------------------------
ACTIONS
--------------------------------------------------------------------------------

    <a href="#" onclick="CryoAssetSimulator.manageTrust('${trustId}')">[Manage Trust]</a>
    <a href="#" onclick="CryoAssetSimulator.showSection('trusts')">[Back]</a>

================================================================================
`;
        render(output);
    }

    function manageTrust(trustId) {
        const trust = state.trusts.find(t => t.trustId === trustId);
        if (!trust) return;

        const action = prompt('Select action:\n1. Add Trustee\n2. Add Beneficiary\n3. Fund Reserve\n4. Make Distribution\n5. Cancel', '1');

        switch(action) {
            case '1':
                const trusteeName = prompt('Trustee name:', 'John Trustee');
                const trusteeRole = prompt('Role (PRIMARY/SUCCESSOR):', 'PRIMARY');
                if (trusteeName) {
                    trust.addTrustee(trusteeName, trusteeRole, 'INDIVIDUAL');
                    alert('Trustee added');
                }
                break;
            case '2':
                const benName = prompt('Beneficiary name:', 'Jane Beneficiary');
                const benRelation = prompt('Relationship:', 'Spouse');
                const benShare = parseFloat(prompt('Share (0-1):', '0.5'));
                if (benName && !isNaN(benShare)) {
                    try {
                        trust.addBeneficiary(benName, benRelation, benShare, 'BOTH');
                        alert('Beneficiary added');
                    } catch (e) {
                        alert(e.message);
                    }
                }
                break;
            case '3':
                const amount = parseFloat(prompt('Amount to add to reserve:', '10000'));
                if (!isNaN(amount)) {
                    trust.fundPreservationReserve(amount);
                    alert('Reserve funded');
                }
                break;
            case '4':
                if (trust.beneficiaries.length === 0) {
                    alert('No beneficiaries to distribute to');
                    break;
                }
                const distAmount = parseFloat(prompt('Distribution amount:', '1000'));
                if (!isNaN(distAmount)) {
                    trust.distribute(trust.beneficiaries[0].beneficiaryId, distAmount, 'INCOME', 'Periodic distribution');
                    alert('Distribution recorded');
                }
                break;
        }
        viewTrust(trustId);
    }

    function requestValuation() {
        const assetId = document.getElementById('valuationAssetId').value;
        const method = document.getElementById('valuationMethod').value;

        if (!assetId) {
            alert('Please select an asset');
            return;
        }

        const asset = state.assets.find(a => a.assetId === assetId);
        if (!asset) return;

        // Simulate valuation with some variance
        const variance = (Math.random() - 0.5) * 0.2;
        const newValue = asset.value.amount * (1 + variance);
        const confidence = 0.7 + Math.random() * 0.25;

        const valuation = {
            valuationId: generateId('VAL'),
            assetId: assetId,
            method: method,
            value: newValue,
            confidence: confidence,
            date: new Date()
        };

        state.valuations.push(valuation);
        asset.updateValue(newValue);

        alert(`Valuation complete: ${formatCurrency(newValue)} (${(confidence * 100).toFixed(0)}% confidence)`);
        renderValuationsSection();
    }

    function initiateRestoration() {
        const registryId = document.getElementById('restoreRegistryId').value;
        const legalOrderId = document.getElementById('legalOrderId').value;

        if (!registryId) {
            alert('Please select a registry');
            return;
        }

        const registry = state.registries.find(r => r.registryId === registryId);
        if (!registry) return;

        if (registry.status === RegistryStatus.TRUST_MANAGED) {
            registry.transition(RegistryStatus.RESTORATION_PENDING, 'SYSTEM', `Legal order: ${legalOrderId}`);
        }

        if (registry.status === RegistryStatus.RESTORATION_PENDING) {
            registry.transition(RegistryStatus.RESTORED, 'SYSTEM', 'Restoration completed');
            alert('Assets restored to individual');
        }

        renderRestorationSection();
    }

    function initiateDistribution() {
        const registryId = document.getElementById('distributeRegistryId').value;
        const deathRecordId = document.getElementById('deathRecordId').value;

        if (!registryId) {
            alert('Please select a registry');
            return;
        }

        const registry = state.registries.find(r => r.registryId === registryId);
        if (!registry) return;

        try {
            registry.transition(RegistryStatus.ESTATE_DISTRIBUTED, 'SYSTEM', `Death record: ${deathRecordId}`);
            alert('Estate distribution initiated');
        } catch (e) {
            alert(e.message);
        }

        renderDistributionSection();
    }

    function calculateSustainability() {
        const portfolioValue = parseFloat(document.getElementById('portfolioValue').value);
        const annualCosts = parseFloat(document.getElementById('annualCosts').value);
        const expectedReturn = parseFloat(document.getElementById('expectedReturn').value) / 100;

        if (isNaN(portfolioValue) || isNaN(annualCosts) || isNaN(expectedReturn)) {
            alert('Please enter valid numbers');
            return;
        }

        // Calculate years until exhaustion
        let years = 0;
        let balance = portfolioValue;
        while (balance > 0 && years < 500) {
            balance = balance * (1 + expectedReturn) - annualCosts;
            years++;
        }

        const sustainableWithdrawal = portfolioValue * 0.03;
        const isSustainable = sustainableWithdrawal >= annualCosts;

        document.getElementById('sustainabilityResult').innerHTML = `
    ---------------------------------------------------------------
    SUSTAINABILITY ANALYSIS
    ---------------------------------------------------------------

    Portfolio Value:      ${formatCurrency(portfolioValue)}
    Annual Costs:         ${formatCurrency(annualCosts)}
    Expected Return:      ${(expectedReturn * 100).toFixed(1)}%

    Years Until Exhaustion: ${years >= 500 ? 'Indefinite' : years + ' years'}
    Sustainable Withdrawal: ${formatCurrency(sustainableWithdrawal)}/year

    Status: ${isSustainable ? '[OK] SUSTAINABLE' : '[!] AT RISK - Costs exceed sustainable rate'}
`;
    }

    function showSection(section) {
        state.currentSection = section;
        switch(section) {
            case 'main': renderMainMenu(); break;
            case 'registries': renderRegistriesSection(); break;
            case 'assets': renderAssetsSection(); break;
            case 'trusts': renderTrustsSection(); break;
            case 'valuations': renderValuationsSection(); break;
            case 'restoration': renderRestorationSection(); break;
            case 'distribution': renderDistributionSection(); break;
            case 'dashboard': renderDashboard(); break;
            case 'investment': renderInvestmentSection(); break;
            default: renderMainMenu();
        }
    }

    // Initialize
    function init() {
        renderMainMenu();
    }

    // Public API
    return {
        init: init,
        showSection: showSection,
        createRegistry: createRegistry,
        viewRegistry: viewRegistry,
        showTransitionForm: showTransitionForm,
        executeTransition: executeTransition,
        createAsset: createAsset,
        viewAsset: viewAsset,
        updateAssetValue: updateAssetValue,
        createTrust: createTrust,
        viewTrust: viewTrust,
        manageTrust: manageTrust,
        requestValuation: requestValuation,
        initiateRestoration: initiateRestoration,
        initiateDistribution: initiateDistribution,
        calculateSustainability: calculateSustainability
    };
})();

// Initialize on load
window.onload = CryoAssetSimulator.init;
</script>
</body>
</html>
