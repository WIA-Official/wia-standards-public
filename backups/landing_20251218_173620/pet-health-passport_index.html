<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA Pet Health Passport Standard</title>
    <link rel="icon" type="image/png" href="https://wiastandards.com/images/favi.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header .emoji { margin-right: 10px; }
        .gradient-text { background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links a { color: #00d4ff; text-decoration: none; margin-left: 20px; }
        .nav-links a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: #a0a0a0; cursor: pointer; font-size: 1rem; transition: all 0.3s; }
        .tab:hover { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .tab.active { background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: white; }
        .content { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 40px; }
        .content h1, .content h2, .content h3 { color: #00d4ff; margin: 20px 0 10px; }
        .content h1 { font-size: 2rem; border-bottom: 2px solid #00d4ff; padding-bottom: 10px; }
        .content h2 { font-size: 1.5rem; }
        .content h3 { font-size: 1.2rem; }
        .content p { line-height: 1.8; margin: 10px 0; }
        .content ul, .content ol { margin: 10px 0 10px 30px; }
        .content li { margin: 5px 0; line-height: 1.6; }
        .content code { background: #1e293b; padding: 2px 8px; border-radius: 4px; font-family: 'Fira Code', monospace; color: #10b981; }
        .content pre { background: #1e293b; padding: 20px; border-radius: 8px; overflow-x: auto; margin: 15px 0; }
        .content pre code { padding: 0; background: none; }
        .content table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .content th, .content td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        .content th { color: #00d4ff; background: rgba(0,212,255,0.1); }
        .content blockquote { border-left: 4px solid #7b2cbf; padding-left: 20px; margin: 15px 0; color: #a0a0a0; }
        .content a { color: #00d4ff; }
        .badge { display: inline-block; padding: 5px 15px; background: #10b981; border-radius: 15px; font-size: 0.8rem; margin-bottom: 20px; }
        .stats { display: flex; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-num { font-size: 2rem; color: #00d4ff; font-weight: bold; }
        .stat-label { font-size: 0.85rem; color: #888; }
        .loading { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="emoji">🐾</span> <span class="gradient-text">WIA Pet Health Passport</span></h1>
        <nav class="nav-links">
            <a href="https://wiastandards.com">← WIA Standards</a>
            <a href="https://github.com/WIA-Official/wia-standards" target="_blank">GitHub</a>
        </nav>
    </div>

    <div class="container">
        <span class="badge">🐾 PET-LIFE Standard v1.0.0</span>
        
        <div class="stats">
            <div class="stat"><div class="stat-num">4</div><div class="stat-label">Phases</div></div>
            <div class="stat"><div class="stat-num">12</div><div class="stat-label">Files</div></div>
            <div class="stat"><div class="stat-num">5</div><div class="stat-label">Core Functions</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="loadDoc('README.md')">📖 Overview</button>
            <button class="tab" onclick="loadDoc('spec/PHASE-1-DATA-FORMAT.md')">📊 Phase 1: Data</button>
            <button class="tab" onclick="loadDoc('spec/PHASE-2-ALGORITHMS.md')">🧮 Phase 2: Algorithms</button>
            <button class="tab" onclick="loadDoc('spec/PHASE-3-PROTOCOL.md')">📡 Phase 3: Protocol</button>
            <button class="tab" onclick="loadDoc('spec/PHASE-4-INTEGRATION.md')">🔗 Phase 4: Integration</button>
        </div>

        <div class="content" id="content">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <script>
        async function loadDoc(path) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const res = await fetch(path);
                const text = await res.text();
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (e) {
                document.getElementById('content').innerHTML = '<p>Error loading document.</p>';
            }
        }
        
        // 초기 로드
        loadDoc('README.md');
    </script>
</body>
</html>
