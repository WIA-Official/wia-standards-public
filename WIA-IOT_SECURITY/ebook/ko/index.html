<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA-IOT_SECURITY 전자책 - 목차 | 弘益人間</title>
    <style>
        :root{--primary:#10B981;--primary-dark:#059669;--bg:#0f172a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--gold:#ffd700}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8}
        .container{max-width:900px;margin:0 auto;padding:20px}
        .header{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--border);margin-bottom:30px;flex-wrap:wrap;gap:15px}
        .header-left{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
        .header-logo{color:var(--text);text-decoration:none;font-weight:bold}
        .header-logo:hover{color:var(--primary)}
        .header-title{color:var(--primary);font-size:.95rem}
        .lang-switch{display:flex;gap:5px}
        .lang-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:6px;text-decoration:none;font-size:.85rem}
        .lang-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
        .hero{text-align:center;padding:60px 20px;background:linear-gradient(135deg,var(--bg-card),#1a2a3a);border-radius:16px;margin-bottom:40px}
        .hero-emoji{font-size:80px;margin-bottom:20px}
        .hero h1{font-size:2.5rem;color:var(--primary);margin-bottom:15px}
        .hero p{color:var(--text-muted);font-size:1.1rem;max-width:600px;margin:0 auto}
        .book-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:40px 0;padding:30px;background:var(--bg-card);border-radius:12px;border:1px solid var(--border)}
        .info-item{text-align:center}
        .info-value{font-size:1.5rem;color:var(--primary);font-weight:bold}
        .info-label{color:var(--text-muted);font-size:.9rem}
        .toc{background:var(--bg-card);border-radius:16px;padding:30px;border:1px solid var(--border)}
        .toc h2{color:var(--primary);margin-bottom:25px;font-size:1.5rem}
        .chapter-list{list-style:none}
        .chapter-item{margin-bottom:15px}
        .chapter-link{display:flex;align-items:center;gap:15px;padding:20px;background:var(--bg);border-radius:12px;text-decoration:none;color:var(--text);border:1px solid var(--border);transition:all .3s}
        .chapter-link:hover{border-color:var(--primary);transform:translateX(5px)}
        .chapter-num{width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
        .chapter-content{flex:1}
        .chapter-title{font-size:1.1rem;font-weight:600;margin-bottom:5px}
        .chapter-desc{color:var(--text-muted);font-size:.9rem}
        .cta-box{background:linear-gradient(135deg,var(--bg-card),#1a3a2a);border:2px solid var(--primary);border-radius:12px;padding:30px;text-align:center;margin:40px 0}
        .cta-box h3{color:var(--primary);margin-bottom:15px}
        .cta-box p{color:var(--text-muted);margin-bottom:20px}
        .cta-btn{display:inline-block;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:14px 30px;border-radius:8px;text-decoration:none;font-weight:bold;transition:all .2s}
        .cta-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(16,185,129,.3)}
        footer{margin-top:60px;padding:30px 0;border-top:1px solid var(--border);text-align:center}
        footer .philosophy{color:var(--gold);font-size:1.1rem;margin-bottom:10px}
        footer p{color:var(--text-muted);margin:5px 0}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <a href="https://wiastandards.com" class="header-logo" target="_blank">🤟 WIA</a>
                <span class="header-title">🔐 WIA-IOT_SECURITY 전자책</span>
            </div>
            <div class="lang-switch">
                <a href="../en/index.html" class="lang-btn">EN</a>
                <a href="index.html" class="lang-btn active">KO</a>
            </div>
        </header>

        <section class="hero">
            <div class="hero-emoji">🔐</div>
            <h1>WIA-IOT_SECURITY 표준</h1>
            <p>IoT 보안의 완벽한 가이드: 디바이스 인증, 펌웨어 보호, 암호화 표준, OWASP IoT Top 10 규정 준수</p>
        </section>

        <div class="book-info">
            <div class="info-item">
                <div class="info-value">8</div>
                <div class="info-label">챕터</div>
            </div>
            <div class="info-item">
                <div class="info-value">v1.0</div>
                <div class="info-label">버전</div>
            </div>
            <div class="info-item">
                <div class="info-value">2025</div>
                <div class="info-label">출판년도</div>
            </div>
            <div class="info-item">
                <div class="info-value">$149</div>
                <div class="info-label">가격</div>
            </div>
        </div>

        <div class="cta-box">
            <h3>🔐 IoT 생태계를 보호하세요</h3>
            <p>수십억 개의 연결된 장치를 사이버 위협으로부터 보호하는 산업 모범 사례를 배우세요</p>
            <a href="chapter-01.html" class="cta-btn">읽기 시작 →</a>
        </div>

        </div>
</body>
</html>
