[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-safety-physical"
version = "1.0.0"
description = "WIA AI Safety Physical Python SDK (Safety-zone definition and enforcement for physically-acting AI systems)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-safety-physical", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-safety-physical/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_safety_physical*"]
