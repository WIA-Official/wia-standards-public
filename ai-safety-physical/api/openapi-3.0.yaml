components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.wia.live/oauth/authorize
          tokenUrl: https://auth.wia.live/oauth/token
          scopes:
            read: Read access
            write: Write access
  schemas:
    SafetyZone:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        polygon:
          type: array
          items: {}
        hazardLevel:
          type: string
      required:
      - id
    Hazard:
      type: object
      properties:
        id:
          type: string
        zoneId:
          type: string
        type:
          type: string
        severity:
          type: string
      required:
      - id
    Incident:
      type: object
      properties:
        id:
          type: string
        zoneId:
          type: string
        agentId:
          type: string
        description:
          type: string
      required:
      - id
    EmergencyStop:
      type: object
      properties:
        id:
          type: string
        zoneId:
          type: string
        triggeredBy:
          type: string
        triggeredAt:
          type: string
          format: date-time
      required:
      - id
