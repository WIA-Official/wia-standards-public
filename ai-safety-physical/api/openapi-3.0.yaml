      operationId: deleteIncident
      responses:
        '204':
          description: Deleted
  /emergency-stops:
    get:
      summary: List EmergencyStop
      operationId: listEmergencyStop
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 200
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Page of emergency-stops
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmergencyStop'
                  total:
                    type: integer
    post:
      summary: Create EmergencyStop
      operationId: createEmergencyStop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyStop'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyStop'
  /emergency-stops/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get EmergencyStop by id
      operationId: getEmergencyStop
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyStop'
        '404':
          description: Not found
    put:
      summary: Replace EmergencyStop
      operationId: replaceEmergencyStop
      requestBody:
        required: true
        content:
          application/json:
            schema:
