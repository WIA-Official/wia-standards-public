openapi: 3.0.3
info:
  title: WIA AI Safety Physical
  version: 1.0.0
  description: Safety-zone definition and enforcement for physically-acting AI systems
  license:
    name: MIT
  contact:
    name: WIA — World Certification Industry Association
servers:
- url: https://api.wia.live/ai-safety-physical/v1
  description: Production
- url: https://api-staging.wia.live/ai-safety-physical/v1
  description: Staging
security:
- apiKey: []
- oauth2:
  - read
  - write
paths:
  /safety-zones:
    get:
      summary: List SafetyZone
      operationId: listSafetyZone
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 200
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Page of safety-zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SafetyZone'
                  total:
                    type: integer
    post:
      summary: Create SafetyZone
      operationId: createSafetyZone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SafetyZone'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyZone'
  /safety-zones/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get SafetyZone by id
      operationId: getSafetyZone
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyZone'
        '404':
          description: Not found
    put:
      summary: Replace SafetyZone
      operationId: replaceSafetyZone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SafetyZone'
      responses:
        '200':
          description: Replaced
    delete:
      summary: Delete SafetyZone
      operationId: deleteSafetyZone
      responses:
        '204':
          description: Deleted
  /hazards:
    get:
      summary: List Hazard
      operationId: listHazard
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 200
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
