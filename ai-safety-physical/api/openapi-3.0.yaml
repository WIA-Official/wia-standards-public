  /hazards/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get Hazard by id
      operationId: getHazard
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hazard'
        '404':
          description: Not found
    put:
      summary: Replace Hazard
      operationId: replaceHazard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Hazard'
      responses:
        '200':
          description: Replaced
    delete:
      summary: Delete Hazard
      operationId: deleteHazard
      responses:
        '204':
          description: Deleted
  /incidents:
    get:
      summary: List Incident
      operationId: listIncident
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 200
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Page of incidents
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Incident'
                  total:
                    type: integer
    post:
      summary: Create Incident
      operationId: createIncident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Incident'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
  /incidents/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get Incident by id
      operationId: getIncident
      responses:
        '200':
          description: Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '404':
          description: Not found
    put:
      summary: Replace Incident
      operationId: replaceIncident
      requestBody:
        required: true
        content:
          application/json:
