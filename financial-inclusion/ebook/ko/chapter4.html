    <header><div class="container"><h1>4장: 모바일 머니 혁명</h1></div></header>

        케냐의 M-Pesa로 시작된 모바일 머니 혁명은 금융 포용에서 가장 성공적인 혁신 중 하나입니다. 2007년 출시 이후 수억 명의 사람들에게 금융 서비스를 제공했습니다. <h2>M-Pesa 이야기</h2><p>M-Pesa는 2007년 케냐에서 출시되어 기본 휴대폰을 통한 송금을 가능하게 했습니다. 현재 30백만 명 이상의 사용자와 연간 600억 달러 이상의 거래를 처리합니다.</p><h2>글로벌 확장</h2><p>모바일 머니는 95개국에서 17억 개의 등록 계정과 연간 1.3조 달러의 거래 가치를 기록하고 있습니다.</p>
