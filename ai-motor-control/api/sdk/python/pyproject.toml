[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-motor-control"
version = "1.0.0"
description = "WIA AI Motor Control Python SDK (Motor registration, command issuance, and trajectory tracking for AI-driven actuators)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-motor-control", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-motor-control/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_motor_control*"]
