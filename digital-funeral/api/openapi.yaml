openapi: 3.1.0
info:
  title: WIA-LIFE-008 Digital Funeral API
  version: 1.0.0
  description: |
    OpenAPI 3.1 description for the Digital Funeral standard. Endpoints
    support service-record creation, livestream metadata exchange, and
    posthumous memorial-page management. Authentication uses OAuth 2.1
    (RFC 9700).
servers:
  - url: https://api.example.com/wia-life-008/v1
paths:
  /service:
    post: { summary: Create a service record, responses: { '201': { description: Created } } }
  /memorial/{id}:
    get: { summary: Retrieve a memorial page, parameters: [{ name: id, in: path, required: true, schema: { type: string } }], responses: { '200': { description: OK } } }
