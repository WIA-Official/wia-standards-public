[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-pet-welfare-global"
version = "1.0.0"
description = "WIA Pet Welfare Global Python SDK (Global companion-animal welfare indicators and incident reporting)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "pet-welfare-global", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/pet-welfare-global/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_pet_welfare_global*"]
