openapi: 3.1.0
info: { title: WIA-ROBOT-005 Delivery Robot, version: 1.0.0 }
servers: [{ url: https://api.example.com/wia-robot-005/v1 }]
paths:
  /robot: { get: { responses: { '200': { description: OK } } } }
  /mission:
    post: { responses: { '201': { description: Created } } }
  /telemetry/{robotId}:
    post: { parameters: [{ name: robotId, in: path, required: true, schema: { type: string } }], responses: { '202': { description: Accepted } } }
  /incident:
    post: { responses: { '201': { description: Created } } }
