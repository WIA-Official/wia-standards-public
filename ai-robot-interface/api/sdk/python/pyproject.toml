[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wia-ai-robot-interface"
version = "1.0.0"
description = "WIA AI Robot Interface Python SDK (Unified REST + WSS interface for state, sensor streams, and capability discovery)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "WIA — World Certification Industry Association" }]
keywords = ["wia", "standard", "ai-robot-interface", "openapi"]
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[project.urls]
Homepage = "https://github.com/WIA-Official/wia-standards"
Spec = "https://github.com/WIA-Official/wia-standards/tree/main/standards/ai-robot-interface/api"

[tool.setuptools.packages.find]
where = ["."]
include = ["wia_ai_robot_interface*"]
