<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA-IND-005 전자책: 화장품 데이터 표준 | 弘益人間</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-secondary: #cbd5e1;
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid var(--primary);
        }

        .philosophy {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .toc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .toc h2 {
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .toc ol {
            list-style: none;
            counter-reset: chapter;
        }

        .toc li {
            margin-bottom: 1rem;
            counter-increment: chapter;
        }

        .toc a {
            color: var(--text);
            text-decoration: none;
            display: block;
            padding: 1rem;
            background: var(--bg);
            border-radius: 4px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .toc a:hover {
            background: rgba(245, 158, 11, 0.1);
            transform: translateX(8px);
        }

        .toc a::before {
            content: "제 " counter(chapter) "장: ";
            color: var(--primary);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: var(--bg);
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: var(--bg);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="philosophy">弘益人間 - 널리 인간을 이롭게 하라</p>
            <h1>WIA-IND-005</h1>
            <p class="subtitle">화장품 데이터 표준 완전 가이드</p>
        </header>

        <div class="toc">
            <h2>목차</h2>
            <ol>
                <li><a href="chapter-01.html">화장품 데이터 표준 소개</a></li>
                <li><a href="chapter-02.html">성분 데이터베이스와 INCI 시스템</a></li>
                <li><a href="chapter-03.html">안전성 및 규제 표준</a></li>
                <li><a href="chapter-04.html">제품 제형 데이터 관리</a></li>
                <li><a href="chapter-05.html">소비자 안전 및 추적 가능성</a></li>
                <li><a href="chapter-06.html">알레르겐 관리 및 검출</a></li>
                <li><a href="chapter-07.html">공급망 투명성</a></li>
                <li><a href="chapter-08.html">화장품 데이터의 미래</a></li>
            </ol>
        </div>

        </div>
</body>
</html>
