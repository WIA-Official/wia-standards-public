<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIA-AI-023 NLP 표준 - 전자책</title>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--primary), #34D399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 50px;
        }
        .toc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
        }
        .toc h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .chapter-list {
            list-style: none;
        }
        .chapter-list li {
            margin: 15px 0;
        }
        .chapter-list a {
            display: block;
            padding: 15px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s;
        }
        .chapter-list a:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }
        .chapter-num {
            color: var(--primary);
            font-weight: 600;
            margin-right: 10px;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }
        .philosophy {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
    </style>
</head>
